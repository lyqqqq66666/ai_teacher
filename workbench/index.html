<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>希沃智教π · AI 批改测试工作台</title>
    <meta
      name="description"
      content="改作业 · 数据看板。支持班级名单拍照导入与手动校正。高中数学：框选、公式字符化、智能制答、乱序对齐。"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <header class="workbench-topnav">
      <a class="wb-logo" href="../index.html" aria-label="返回产品首页">
        <img src="../assets/seewo-logo.svg" alt="seewo" />
        <span>智教π</span>
      </a>
      <nav aria-label="工作台导航">
        <a href="../index.html#why">为何需要</a>
        <a href="../index.html#how">怎么做成</a>
        <a href="../index.html#demo">可试用</a>
        <a href="../index.html#fit">如何落地</a>
        <a href="../index.html#problems">命题对照</a>
        <a class="active" href="./index.html">测试工作台</a>
      </nav>
      <a class="wb-action" href="../index.html">返回首页</a>
    </header>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">π</div>
          <div>
            <h1>希沃智教π</h1>
            <p>作业批改系统</p>
          </div>
        </div>

        <div class="side-block">
          <h3>菜单</h3>
          <nav class="side-nav side-nav-main" aria-label="主导航">
            <button type="button" data-nav="grade" class="active">
              <span class="nav-icon">✎</span>
              <span>改作业</span>
            </button>
            <button type="button" data-nav="dashboard">
              <span class="nav-icon">▣</span>
              <span>数据看板</span>
            </button>
            <button type="button" data-nav="models">
              <span class="nav-icon">◎</span>
              <span>识别服务</span>
            </button>
          </nav>
        </div>

        <div class="meta-card" id="meta-box">加载中…</div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <h2 id="page-title">改作业</h2>
            <p class="sub" id="page-sub">加载中…</p>
          </div>
          <div class="top-actions">
            <button type="button" class="class-switcher" id="btn-class-switch" title="选择班级 / 查看名单">
              <span class="class-switcher-label">班级</span>
              <strong id="class-switcher-name">—</strong>
              <span class="class-switcher-count" id="class-switcher-count">0 人</span>
              <span class="class-switcher-caret">▾</span>
            </button>
            <span class="tag" id="ai-status-pill" title="本机 AI 代理状态">AI 检测中…</span>
            <span class="tag" id="mode-pill">模式 —</span>
            <span class="tag" id="task-pill">无任务</span>
          </div>
        </div>

        <!-- 改作业：向导 + 复核（子视图） -->
        <section id="panel-grade" class="panel active">
          <div class="grade-tabs" id="grade-tabs">
            <button type="button" class="grade-tab active" data-grade-tab="wizard">导入批改</button>
            <button type="button" class="grade-tab" data-grade-tab="review">批改复核</button>
            <button type="button" class="grade-tab" data-grade-tab="tasks">任务列表</button>
          </div>
          <div id="grade-view-wizard" class="grade-view active"></div>
          <div id="grade-view-review" class="grade-view"></div>
          <div id="grade-view-tasks" class="grade-view"></div>
        </section>

        <!-- 数据看板 -->
        <section id="panel-dashboard" class="panel">
          <div id="dashboard-body"></div>
        </section>

        <!-- 识别服务：模型中心 / 本地代理状态 -->
        <section id="panel-models" class="panel">
          <div id="models-body"></div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div id="lightbox-root"></div>
    <div id="modal-root"></div>

    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
    <script src="./data/demo-data.js"></script>
    <script src="./data/lj-roster.js"></script>
    <script src="./data/hs-chinese-corpus.js"></script>
    <script src="./data/hs-math-demo.js"></script>
    <script src="./js/grader.js"></script>
    <script src="./js/matcher.js"></script>
    <script src="./js/math-format.js"></script>
    <script src="./js/question-split.js"></script>
    <script src="./js/math-pipeline.js"></script>
    <script src="./js/ai-client.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
